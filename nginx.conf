server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;
    root         /usr/share/nginx/html;

    # gzip the text assets (the JS bundle is ~2MB uncompressed)
    gzip              on;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length   1024;

    # Expo Router static export writes one .html per route (library.html,
    # score.html, …) plus hashed assets under /_expo. Map clean URLs onto
    # those files; fall back to the app shell so deep links still boot.
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    # Immutable, content-hashed build assets — cache hard.
    location /_expo/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }
}
